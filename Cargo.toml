[package]
name = "apcore"
version = "0.13.0"
edition = "2021"
description = "Schema-driven module standard for AI-perceivable interfaces"
license = "Apache-2.0"
readme = "README.md"
authors = ["aipartnerup <tercel.yi@gmail.com>"]
homepage = "https://aipartnerup.com"
repository = "https://github.com/aipartnerup/apcore-rust"
documentation = "https://apcore.aipartnerup.com/"
keywords = ["ai", "llm", "middleware", "observability", "schema"]
categories = [
    "api-bindings",
    "asynchronous",
    "development-tools",
    "web-programming",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
schemars = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
async-trait = "0.1"
tracing = "0.1"
regex = "1"

[dev-dependencies]
tokio-test = "0.4"
